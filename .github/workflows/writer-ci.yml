name: Writer CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: writer-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Lint
        run: make lint

      - name: Test
        run: make test
