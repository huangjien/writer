name: CI/CD Pipeline

on:
  push:
    branches: ['*']
permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install --legacy-peer-deps 
      
    - name: Apply patches
      run: npx patch-package
      
    - name: Force reinstall lightningcss for Linux
      run: npm uninstall lightningcss && npm install lightningcss@^1.27.0 --legacy-peer-deps
      
    - name: Rebuild native modules
      run: npm rebuild
      
    - name: Run tests
      run: npm test
      
    - name: Run doctor check
      run: ./doctor.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      
    - name: Setup Expo CLI
      run: npm install -g @expo/cli
      
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Apply patches
      run: npx patch-package
      
    - name: Rebuild native modules
      run: npm rebuild
      
    - name: Create temp directory
      run: mkdir -p ~/temp
      
    - name: Create native Android project and Build APK
      run: |
        # Create native Android project using Expo prebuild
        echo "Creating native Android project using Expo prebuild..."
        CI=1 npx expo prebuild --platform android --no-install
        
        # Install dependencies for the native project
        echo "Installing dependencies for native Android project..."
        npm install --legacy-peer-deps
        
        # Force reinstall lightningcss for Linux
        echo "Force reinstalling lightningcss for Linux platform..."
        npm uninstall lightningcss && npm install lightningcss@^1.27.0 --legacy-peer-deps
        
        # Rebuild native modules
        echo "Rebuilding native modules..."
        npm rebuild
        
        # Apply patches AFTER rebuild to ensure they stick
        echo "Applying patches after rebuild..."
        # First verify patch file exists
        if [ -f "patches/react-native-css-interop+0.1.22.patch" ]; then
          echo "✓ Patch file found"
          cat patches/react-native-css-interop+0.1.22.patch | head -10
        else
          echo "✗ Patch file not found!"
          ls -la patches/ || echo "Patches directory not found"
          exit 1
        fi
        npx patch-package
        
        # Verify patch was applied
        echo "Verifying patch application..."
        if grep -q "options: ParseDeclarationOptionsWithValueWarning" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts; then
          echo "✓ Patch successfully applied"
        else
          echo "✗ Patch not applied, attempting to reapply..."
          npx patch-package --reverse
          npx patch-package
          # Verify again
          if grep -q "options: ParseDeclarationOptionsWithValueWarning" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts; then
            echo "✓ Patch successfully applied on retry"
          else
            echo "✗ Patch failed to apply - showing file content for debugging"
            echo "Current parseAspectRatio function:"
            grep -A 15 "function parseAspectRatio" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts || echo "Function not found"
            echo "Current parseDeclaration aspect-ratio case:"
            grep -A 5 -B 2 "aspect-ratio" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts || echo "Case not found"
            exit 1
          fi
        fi
        
        # Make Gradle wrapper executable
        if [ -f "android/gradlew" ]; then
          chmod +x android/gradlew
          echo "Made Gradle wrapper executable"
        fi
        
        # Final verification that patch is still active before build
        echo "Final patch verification before build..."
        if grep -q "options: ParseDeclarationOptionsWithValueWarning" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts; then
          echo "✓ Patch confirmed active before build"
        else
          echo "✗ Patch lost before build - reapplying..."
          npx patch-package
          # Final verification after reapplication
          if grep -q "options: ParseDeclarationOptionsWithValueWarning" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts; then
            echo "✓ Patch successfully reapplied before build"
          else
            echo "✗ Critical: Patch cannot be applied - build will fail"
            echo "Showing detailed file analysis:"
            echo "File exists check:"
            ls -la node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts || echo "File not found"
            echo "parseAspectRatio function signature:"
            grep -A 5 "function parseAspectRatio" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts || echo "Function not found"
            echo "aspect-ratio case in parseDeclaration:"
            grep -A 10 -B 2 "case \"aspect-ratio\"" node_modules/react-native-css-interop/src/css-to-rn/parseDeclaration.ts || echo "Case not found"
            exit 1
          fi
        fi
        
        # Build Android APK using Gradle
        echo "Building Android APK using Gradle..."
        ./buildAndroid.sh
        
        # Verify APK was created
        if [ -f "$HOME/temp/writer.apk" ]; then
          echo "APK build successful!"
          ls -la "$HOME/temp/writer.apk"
        else
          echo "Error: APK was not created"
          exit 1
        fi
      
    - name: Get package version
      id: package-version
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      
    - name: Install GitHub CLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y
      
    - name: Upload APK to GitHub Packages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Create a unique package name with version and timestamp
        PACKAGE_NAME="writer-apk"
        VERSION="${{ steps.package-version.outputs.version }}"
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        APK_NAME="writer-v${VERSION}-${TIMESTAMP}.apk"
        
        # Check if APK exists and copy with version info
        if [ -f "$HOME/temp/writer.apk" ]; then
          cp "$HOME/temp/writer.apk" "$HOME/temp/${APK_NAME}"
          echo "APK found and renamed to ${APK_NAME}"
        else
          echo "Error: APK not found at $HOME/temp/writer.apk"
          echo "Listing contents of $HOME/temp:"
          ls -la "$HOME/temp/" || echo "temp directory does not exist"
          echo "Checking for APK in build output:"
          ls -la android/app/build/outputs/apk/release/ || echo "Build output directory not found"
          exit 1
        fi
        
        # Upload to GitHub Packages using GitHub CLI
        gh release create "v${VERSION}-${TIMESTAMP}" "$HOME/temp/${APK_NAME}" \
          --title "Writer APK v${VERSION}" \
          --notes "Automated APK build for Writer app version ${VERSION}" \
          --prerelease
    
    - name: Publish release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CI: true
      run: pnpm run publishRelease